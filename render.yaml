databases:
  - name: portfolio-manager-db
    databaseName: portfolio_manager
    user: portfolio_manager_user
    plan: free

services:
  - type: web
    name: portfolio-manager-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: python manage.py migrate && python manage.py init_admin && gunicorn backend.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DEBUG
        value: false
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: portfolio-manager-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: FRONTEND_URL
        value: https://frontend-richard-obukus-projects.vercel.app
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        value: Admin@2024!
      - key: ADMIN_EMAIL
        value: richard.obuku@gopa.eu
      - key: GMAIL_HOST_USER
        value: richobuku@gmail.com
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: EMAIL_REPLY_TO
        value: richard.obuku@gopa.eu
    healthCheckPath: /api/msmes/
    autoDeploy: true
