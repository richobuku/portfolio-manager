databases:
  - name: portfolio-manager-db
    databaseName: portfolio_manager
    user: portfolio_manager_user
    plan: free

services:
  - type: web
    name: portfolio-manager-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python manage.py collectstatic --noinput && python manage.py migrate && python manage.py init_admin && gunicorn backend.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DEBUG
        value: false
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: portfolio-manager-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: .onrender.com
      # Canonical public URL — used for password-reset links, CORS allow-list,
      # and any other place the backend needs to know the frontend's address.
      - key: FRONTEND_URL
        value: https://bds.glowi.africa
      # Comma-separated extras kept in CORS allow-list so the legacy Vercel
      # URLs continue to work alongside the canonical custom domain.
      - key: CORS_EXTRA_ORIGINS
        value: https://frontend-richard-obukus-projects.vercel.app,https://frontend-richobuku-richard-obukus-projects.vercel.app,https://frontend-two-rose-13.vercel.app
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        value: Admin@2024!
      - key: ADMIN_EMAIL
        value: richobuku@gmail.com
      - key: GMAIL_HOST_USER
        value: richobuku@gmail.com
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: EMAIL_REPLY_TO
        value: richard.obuku@gopa.eu
    healthCheckPath: /api/msmes/
    autoDeploy: true
