<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80" width="200" height="80">
  <!-- GOPA AFC Corporate Logo -->
  <rect x="0" y="0" width="200" height="80" rx="4" fill="#003D7A"/>
  <!-- Globe circle -->
  <circle cx="32" cy="40" r="22" fill="none" stroke="white" stroke-width="2.5"/>
  <!-- Latitude lines -->
  <ellipse cx="32" cy="40" rx="11" ry="22" fill="none" stroke="white" stroke-width="1.5"/>
  <line x1="10" y1="40" x2="54" y2="40" stroke="white" stroke-width="1.5"/>
  <line x1="13" y1="28" x2="51" y2="28" stroke="white" stroke-width="1"/>
  <line x1="13" y1="52" x2="51" y2="52" stroke="white" stroke-width="1"/>
  <!-- GOPA text -->
  <text x="68" y="36"
    font-family="Arial, Helvetica, sans-serif"
    font-size="26"
    font-weight="900"
    fill="white"
    text-anchor="start"
    letter-spacing="1">GOPA</text>
  <!-- AFC text -->
  <text x="70" y="58"
    font-family="Arial, Helvetica, sans-serif"
    font-size="16"
    font-weight="600"
    fill="#F5A623"
    text-anchor="start"
    letter-spacing="3">AFC</text>
</svg>
