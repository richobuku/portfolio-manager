<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1A2F4B" />
    <meta
      name="description"
      content="PRUDEV II Portfolio Manager - MSME and Business Growth Expert Management System"
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <!-- Google Analytics GA4 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-LNDEM4R5N0"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-LNDEM4R5N0', { send_page_view: false });
    </script>
    <title>PRUDEV II Portfolio Manager</title>
    <script>
      window.onerror = function(msg, src, line, col, err) {
        document.getElementById('root').innerHTML =
          '<div style="padding:20px;background:#fff2f2;font-family:monospace;font-size:13px;color:#900">' +
          '<b>JS ERROR:</b><br>' + msg + '<br><br>' +
          '<b>Source:</b> ' + src + ' line ' + line + '<br><br>' +
          '<b>Stack:</b><pre>' + (err && err.stack ? err.stack : 'none') + '</pre>' +
          '</div>';
      };
      window.addEventListener('unhandledrejection', function(e) {
        document.getElementById('root').innerHTML =
          '<div style="padding:20px;background:#fff2f2;font-family:monospace;font-size:13px;color:#900">' +
          '<b>UNHANDLED PROMISE REJECTION:</b><br>' + e.reason + '</div>';
      });
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
