<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#1A2E42" />
    <title>PRUDEV II Offline</title>
    <style>
      :root {
        color-scheme: light;
        --primary: #1A2E42;
        --accent: #C8102E;
        --bg: #F4F6F9;
        --text: #17212B;
        --muted: #667085;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: var(--bg);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        color: var(--text);
      }
      main {
        width: min(100%, 420px);
        background: #fff;
        border: 1px solid #E4E7EC;
        border-radius: 12px;
        box-shadow: 0 10px 28px rgba(16, 24, 40, 0.08);
        padding: 28px;
      }
      .mark {
        width: 56px;
        height: 56px;
        border-radius: 14px;
        display: grid;
        place-items: center;
        background: var(--primary);
        color: #fff;
        font-size: 28px;
        font-weight: 800;
        border-bottom: 6px solid var(--accent);
        margin-bottom: 18px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 22px;
        line-height: 1.2;
      }
      p {
        margin: 0 0 18px;
        color: var(--muted);
        line-height: 1.55;
      }
      button {
        border: 0;
        border-radius: 8px;
        background: var(--primary);
        color: #fff;
        font-weight: 700;
        padding: 11px 16px;
        width: 100%;
        font-size: 15px;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark">P</div>
      <h1>You are offline</h1>
      <p>PRUDEV II needs a connection for live programme data. Reconnect and try again to sync the latest MSMEs, reports, training sessions and work orders.</p>
      <button type="button" onclick="window.location.reload()">Try again</button>
    </main>
  </body>
</html>
